name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release tag exists
        run: |
          set -euo pipefail
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Release tag '${RELEASE_TAG}' does not exist. Create and push it first: git tag ${RELEASE_TAG} && git push origin ${RELEASE_TAG}"
            exit 1
          fi

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release

      - name: Package release asset
        id: package
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          asset_name="NetBar-macos-${arch}"
          dist_dir="dist"
          package_dir="${dist_dir}/${asset_name}"

          rm -rf "${dist_dir}"
          mkdir -p "${package_dir}"
          cp ".build/release/NetBar" "${package_dir}/"
          cp "README.md" "${package_dir}/"
          chmod +x "${package_dir}/NetBar"

          cat > "${package_dir}/INSTALL.txt" <<'EOF'
          Run from Terminal:

              ./NetBar

          NetBar is a menu bar app. The first sample establishes a baseline, and traffic deltas appear after the next sample.
          EOF

          tar -czf "${dist_dir}/${asset_name}.tar.gz" -C "${dist_dir}" "${asset_name}"
          (cd "${dist_dir}" && shasum -a 256 "${asset_name}.tar.gz" > "${asset_name}.tar.gz.sha256")

          echo "asset=${dist_dir}/${asset_name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${dist_dir}/${asset_name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.package.outputs.asset }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSET}" "${CHECKSUM}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${ASSET}" "${CHECKSUM}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --verify-tag
          fi
